name: Approve article PR by comment

# 記事系PR（Copilot=Bot 作）を、PR への「コメント」で承認し、その場でマージ→本番公開する。
#
# 背景: 非エンジニア（Hina さん等）に GitHub の「Approve（レビュー承認）」ボタンを押させるのは
# UI 的にハードルが高い。そこで、PR にひとこと（例:「承認」）コメントするだけで公開できるようにする。
# 承認できる人の GitHub ログインは .github/article-approvers.json の `approvers` 配列で管理し、
# 増える場合はそこに追記するだけでよい（このワークフローは触らない）。
#
# 仕組み（マージ可否は branch protection ではなくこのワークフローが完全に制御する）:
#  1. allowlist のユーザが triggerPhrases のいずれかをコメントしたら
#  2. PR 作者が Bot(Copilot) = 記事系PR であること・draft でなく open であることを確認し
#  3. PR head の CI（プレビューデプロイ等のチェック）が全て成功しているか確認し
#  4. 問題なければ PAT(COPILOT_ASSIGN_TOKEN) で「その場でマージ」→本番公開する
#
# 注意:
#  - GitHub Actions には絵文字リアクション（👍スタンプ）を直接トリガーにするイベントが無いため、
#    トリガーはコメントのみ。スタンプ運用が必要なら別途ポーリングが要る。
#  - マージは実ユーザの fine-grained PAT (COPILOT_ASSIGN_TOKEN) で行う。GITHUB_TOKEN による
#    push/merge は後続ワークフロー（page_build→公開通知）を再帰防止のため発火させないため、
#    PAT を使って「人によるマージ」として扱わせる。
on:
  issue_comment:
    types: [created]

jobs:
  approve-and-merge:
    runs-on: ubuntu-latest
    # PR へのコメントのみ対象（issue へのコメントは pull_request フィールドが無い）
    if: ${{ github.event.issue.pull_request }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: read
      statuses: read
    steps:
      - name: Checkout (approver list を読むため)
        uses: actions/checkout@v4

      - name: Merge if commented by an approver and CI is green
        uses: actions/github-script@v7
        with:
          # PAT 優先。マージを実ユーザ操作として扱わせ、後続の page_build→公開通知を発火させる。
          # 未設定なら GITHUB_TOKEN にフォールバック（その場合は公開通知が飛ばない可能性あり）。
          github-token: ${{ secrets.COPILOT_ASSIGN_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const comment = context.payload.comment;
            const prNumber = context.payload.issue.number;
            const commenter = comment.user.login;

            // 1) approver list / トリガー語を読み込む
            const cfg = JSON.parse(fs.readFileSync('.github/article-approvers.json', 'utf8'));
            const approvers = (cfg.approvers ?? []).map(s => s.toLowerCase());
            const phrases = (cfg.triggerPhrases ?? []).map(s => s.toLowerCase());

            // 2) コメントが承認トリガーか判定（コメント全体がトリガー語、または /approve 始まり）
            //    末尾の記号・空白は無視して照合を緩める（「承認！」≈「承認」、「了解です。」≈「了解です」）。
            //    絵文字単体（👍 等）もトリガーにしたいので、絵文字は落とさず句読点系のみ除去する。
            const body = (comment.body ?? '').trim();
            const norm = body.toLowerCase().replace(/[\s!！。.、，,；;：:～~…\-]+$/u, '');
            const isTrigger = phrases.some(p => norm === p) || norm.startsWith('/approve');
            if (!isTrigger) {
              core.info('承認トリガーではないコメントのためスキップします。');
              return;
            }

            // 以降は明確に承認操作なので、結果をコメントで通知する
            const reply = (text) => github.rest.issues.createComment({
              owner, repo, issue_number: prNumber, body: text,
            });

            // 3) コメント主が allowlist に居るか
            if (!approvers.includes(commenter.toLowerCase())) {
              core.warning(`${commenter} は承認権限リストにありません。`);
              await reply(`@${commenter} さんは承認権限リストに登録されていません🙏 承認権限が必要な場合は管理者に連絡してください（権限は \`.github/article-approvers.json\` で管理しています）。`);
              return;
            }

            // 4) PR を取得し、記事系PR（Bot=Copilot 作）か・draft でなく open かを確認
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            if (pr.user.type !== 'Bot') {
              await reply('このPRはエンジニア（人間）によるPRのため、コメント承認の対象外です。通常のレビュー・マージ手順で進めてください。');
              return;
            }
            if (pr.draft) {
              await reply('まだ下書き（draft）のPRです。「Ready for review」にしてから承認してください。');
              return;
            }
            if (pr.state !== 'open') {
              core.info('PR は既にクローズ済みのためスキップします。');
              return;
            }

            // 5) PR head の CI を確認（プレビューデプロイ等のチェック / コミットステータス）
            const ref = pr.head.sha;
            const { data: checks } = await github.rest.checks.listForRef({ owner, repo, ref, per_page: 100 });
            const { data: combined } = await github.rest.repos.getCombinedStatusForRef({ owner, repo, ref });

            const OK = ['success', 'neutral', 'skipped'];
            const badRuns = checks.check_runs.filter(r => r.status === 'completed' && !OK.includes(r.conclusion));
            const pendingRuns = checks.check_runs.filter(r => r.status !== 'completed');
            // コミットステータスは存在する場合のみ評価（Actions のみの構成では空になる）
            const badStatuses = combined.statuses.filter(s => s.state === 'failure' || s.state === 'error');
            const statusPending = combined.statuses.length > 0 && combined.state === 'pending';

            if (badRuns.length || badStatuses.length) {
              const names = [...badRuns.map(r => r.name), ...badStatuses.map(s => s.context)].join(', ');
              await reply(`CI が失敗しているためマージできません🙏（${names}）。修正後にもう一度「承認」とコメントしてください。`);
              return;
            }
            if (pendingRuns.length || statusPending) {
              const names = pendingRuns.map(r => r.name).join(', ') || 'CI';
              await reply(`CI（${names}）が実行中です⏳ 完了後にもう一度「承認」とコメントしてください。`);
              return;
            }

            // 6) その場でマージ → 本番公開
            try {
              await github.rest.pulls.merge({
                owner, repo, pull_number: prNumber,
                merge_method: 'merge',
                commit_title: `${pr.title} (#${prNumber})`,
                commit_message: `@${commenter} さんのコメント「${body}」に基づきマージしました。`,
              });
              core.info(`PR #${prNumber} をマージしました（commenter: ${commenter}）。`);
              await reply('✅ 承認を受け付け、マージしました！ まもなく本番に公開されます🚀');
            } catch (e) {
              core.warning(`マージに失敗しました: ${e.message}`);
              await reply(`マージに失敗しました😢（${e.message}）。コンフリクトの解消が必要か、secrets.COPILOT_ASSIGN_TOKEN の権限不足の可能性があります。`);
            }
