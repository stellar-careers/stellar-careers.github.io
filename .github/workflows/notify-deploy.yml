name: Notify Slack on Pages Deploy

# 本番（GitHub Pages）デプロイ完了時に Slack 通知する。
# ただし通知するのは Copilot（Bot）が作成した記事系 PR のリリースのみ。
# エンジニア（人間）のPRマージや main への直 push では通知しない。
#
# 判定: page_build のビルド対象コミットに紐づく PR を引き、その作者が Bot かで判断する
# （issue ラベルは PR に自動伝播しないため、preview 通知と同じ「PR作者=Bot」信号を使う）。
#
# 重複通知防止（2層）:
#   層1: pr.merge_commit_sha === sha
#        listPullRequestsAssociatedWithCommit は「そのコミットを含む全PR」を返すため、
#        後続のエンジニアPRマージのビルドで古い記事PRが引っかかることがある。
#        merge_commit_sha が一致する = そのビルドがこのPRのマージで直接発生した、と確認できる。
#   層2: PRへの通知済みマーカーコメント
#        GitHub Pages が同一コミット sha で page_build を複数回発火する既知の動作に対応。
#        通知後にマーカーコメントを PR に残し、次回は存在確認でスキップする。
on:
  page_build:

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.build.status == 'built'
    permissions:
      contents: read
      pull-requests: read
      issues: write
    steps:
      - name: Notify Slack for article release
        uses: actions/github-script@v7
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_USER_OAUTH_TOKEN }}
        with:
          script: |
            const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const { owner, repo } = context.repo;
            const site = 'https://stellar-careers.com/';

            // 1) ビルド対象コミット（= main の最新コミット / 記事PRのマージコミット）に紐づくPRを引く
            const sha = context.payload.build && context.payload.build.commit;
            if (!sha) {
              core.info('ビルドコミットが取得できないため通知をスキップ。');
              return;
            }
            core.info(`ビルドコミット: ${sha}`);
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner, repo, commit_sha: sha,
            });
            core.info(`関連PR: ${prs.map(p => `#${p.number}(${p.user.type})`).join(', ') || 'なし'}`);

            // 2) 記事系PR（Copilot=Bot 作）のみ通知。人間のPRや直push（PR無し）はスキップ。
            const pr = prs.find(p => p.user && p.user.type === 'Bot');
            if (!pr) {
              core.info('記事(Copilot)PR のリリースではないため通知をスキップ（エンジニアPR / 直push）。');
              return;
            }

            // 【重複防止・層1】PRのマージコミットがビルドコミットと一致するか確認。
            // 一致しない = 後続の別PRマージのビルドで古い記事PRが検索に引っかかっているケース。
            if (pr.merge_commit_sha !== sha) {
              core.info(`PR #${pr.number} のマージコミット(${pr.merge_commit_sha})がビルドコミット(${sha})と不一致。重複通知をスキップ。`);
              return;
            }

            // 【重複防止・層2】通知済みマーカーの確認（同一sha で page_build が複数回発火する場合の保護）。
            const DEPLOY_MARK = '<!-- notify-deploy:deployed -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr.number, per_page: 100,
            });
            if (comments.some(c => (c.body || '').includes(DEPLOY_MARK))) {
              core.info(`PR #${pr.number} は既にデプロイ通知済みのためスキップ。`);
              return;
            }

            // 3) Slack 通知（Block Kit）
            const text = `🚀 記事を公開しました：${pr.title}`;
            const blocks = [
              { type: 'header', text: { type: 'plain_text', text: '🚀 記事を公開しました', emoji: true } },
              { type: 'section', text: { type: 'mrkdwn', text: `*${esc(pr.title)}*` } },
              { type: 'context', elements: [
                { type: 'mrkdwn', text: `✅ 本番サイトに反映されました。ご対応ありがとうございました！ ;)（<${pr.html_url}|PR #${pr.number}>）` },
              ]},
              { type: 'actions', elements: [
                { type: 'button', text: { type: 'plain_text', text: '🌐 サイトを見る', emoji: true }, url: site, style: 'primary' },
              ]},
            ];

            const res = await fetch('https://slack.com/api/chat.postMessage', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.SLACK_BOT_TOKEN}`,
                'Content-Type': 'application/json; charset=utf-8',
              },
              body: JSON.stringify({
                channel: 'C09KJ7UJ5HQ',
                text,
                blocks,
                unfurl_links: false,
                unfurl_media: false,
              }),
            });
            const data = await res.json();
            if (!data.ok) {
              core.setFailed(`Slack API error: ${data.error}`);
              return;
            }

            // 【重複防止・層2】通知済みマーカーをPRに記録（次回の重複発火でスキップされる）
            await github.rest.issues.createComment({
              owner, repo, issue_number: pr.number, body: DEPLOY_MARK,
            });
            core.info(`PR #${pr.number} にデプロイ通知済みマーカーを記録。`);
