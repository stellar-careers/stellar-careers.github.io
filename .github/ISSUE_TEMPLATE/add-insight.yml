name: "記事追加：Insight（転職体験記・面接対策・仕事術）"
description: "Insight記事の新しい記事を追加するための依頼テンプレート"
labels: ["insight記事"]
assignees:
  - copilot
body:
  - type: markdown
    attributes:
      value: |
        ## Insight 記事の追加依頼

        以下のフォームに記入してください。
        記事ID（URL）の生成や HTML への変換は開発者が対応します。

        ### 画像について
        - **カバー画像**: 記事ページ上部・一覧カード・ホームカルーセルに共通で使用されます。**1200 x 630 px** 推奨。
        - 画像は欄にドラッグ&ドロップで添付してください。

  - type: dropdown
    id: insight-type
    attributes:
      label: 記事カテゴリ
      description: "追加する記事のカテゴリを選択してください。"
      options:
        - "転職体験記（insight-case）"
        - "面接対策（insight-interview）"
        - "仕事術（insight-work）"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: 記事タイトル
      description: "記事の見出しになるタイトルを入力してください。"
      placeholder: "例：【体験記】コンサルtoコンサル転職：年収150万アップを実現"
    validations:
      required: true

  - type: textarea
    id: cover-image
    attributes:
      label: カバー画像
      description: "1200 x 630 px 推奨。記事ページ・一覧カード・ホームカルーセルに共通で使用されます。ここに画像をドラッグ&ドロップしてください。"
      placeholder: "ここに画像をドラッグ&ドロップ"
    validations:
      required: true

  - type: textarea
    id: body-content
    attributes:
      label: 記事本文
      description: |
        Markdown 形式で自由に記述してください。
        見出しは `###` で、段落は空行で区切ります。
      placeholder: |
        ### ステラキャリアズとの出会い

        入社4年目のタイミングでキャリアアップを目指し...

        ### サポート体制

        不明点があった際に、LINEで即レスポンスいただけるので...

        ### 最後に

        新しい職場でもしっかりと結果を出し...
      render: markdown
    validations:
      required: true

  - type: textarea
    id: ogp-description
    attributes:
      label: OGP 説明文
      description: "SNS でシェアされたときに表示される短い説明文（1〜2文）。未入力の場合は開発者が本文から抜粋します。"
      placeholder: "例：SIerからコンサル業界への転職に挑戦し、年収150万アップを実現した体験談。"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: 補足・備考
      description: "その他の要望や注意事項があれば記入してください。"
    validations:
      required: false
